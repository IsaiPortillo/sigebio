# Configuración de conexión a PostgreSQL desde tu máquina (host)
flyway.url=jdbc:postgresql://localhost:5432/sigebio
flyway.user=admin
flyway.password=adminpassword

# Si ejecutas Flyway dentro de otro contenedor en la misma red de Docker,
# usa esta URL en lugar de localhost:
# flyway.url=jdbc:postgresql://db:5432/sigebio

# Configuración de esquemas
flyway.schemas=public
flyway.defaultSchema=public

# Carpeta de migraciones (relativa al proyecto)
flyway.locations=filesystem:./sql

# Espera/reintentos por si PostgreSQL tarda en iniciar
flyway.connectRetries=10