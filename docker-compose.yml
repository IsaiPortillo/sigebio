services:
  db:
    image: postgres:15
    container_name: sigebio_db
    environment:
      POSTGRES_DB: sigebio
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: sigebio_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sigebio.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: